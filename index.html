<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC AI Mentor</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:0;
}
.chat-container{
max-width:420px;
height:600px;
margin:auto;
background:#fff;
display:flex;
flex-direction:column;
border-radius:16px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
.header{
background:#0f766e;
color:#fff;
padding:15px;
font-size:20px;
font-weight:bold;
}
.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
background:#f9fafb;
}
.message{
padding:10px 14px;
margin-bottom:10px;
border-radius:12px;
max-width:85%;
line-height:1.5;
font-size:14px;
}
.bot{
background:#e2e8f0;
color:#111;
}
.user{
background:#0f766e;
color:#fff;
margin-left:auto;
}
.input-area{
display:flex;
padding:10px;
border-top:1px solid #ddd;
background:#fff;
}
input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:14px;
}
button{
margin-left:8px;
padding:12px 16px;
border:none;
background:#0f766e;
color:#fff;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>
<body>

<div class="chat-container">
<div class="header">UPSC AI Mentor</div>

<div class="chat-box" id="chatBox">
<div class="message bot">
Hello! Ask any UPSC preparation doubt.
</div>
</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask your question...">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>
async function sendMessage() {
const input = document.getElementById("userInput");
const question = input.value.trim();

if (!question) return;

const chatBox = document.getElementById("chatBox");

chatBox.innerHTML += `<div class="message user">${question}</div>`;
input.value = "";

chatBox.innerHTML += `<div class="message bot" id="loading">Thinking...</div>`;
chatBox.scrollTop = chatBox.scrollHeight;

try {
const response = await fetch("/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ question })
});

const data = await response.json();

document.getElementById("loading").remove();

chatBox.innerHTML += `
<div class="message bot">
${data.answer || "Unable to answer right now."}
</div>
`;

chatBox.scrollTop = chatBox.scrollHeight;

} catch (error) {

document.getElementById("loading").remove();

chatBox.innerHTML += `
<div class="message bot">
Server error. Please try again later.
</div>
`;
}
}
</script>

</body>
</html>
